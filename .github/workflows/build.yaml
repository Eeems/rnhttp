name: Check and Build
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
  release:
    types: [released]
permissions: read-all
jobs:
  lint:
    name: Lint codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Run lint
        run: |
          set -e
          pip install wheel packaging
          SKIP_TESTS=1 make lint

  test:
    name: Test with python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: &python-versions
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
      fail-fast: false
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Run tests
        run: |
          set -e
          pip install wheel packaging
          SKIP_TESTS=1 make test

  build-wheel:
    name: Build wheel
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: *python-versions
        arch:
          - x86_64
          - i686
          - ppc64le
          - aarch64
          - armv7l
        libc:
          - glibc
          - musl
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Building package
        run: ./wheel.sh
        env:
          python: ${{ matrix.python }}
          arch: ${{ matrix.arch }}
          libc: ${{ matrix.libc }}
      - uses: actions/upload-artifact@v6
        with:
          name: pip-wheel-${{ matrix.python }}-${{ matrix.arch }}-${{ matrix.libc }}
          path: wheelhouse/*
          if-no-files-found: error
  build-sdist:
    name: Build sdist
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install build tool
        run: pip install build
      - name: Building package
        run: |
          set -e
          pip install wheel packaging
          SKIP_TESTS=1 make sdist
      - uses: actions/upload-artifact@v6
        with:
          name: pip-sdist
          path: dist/*
          if-no-files-found: error
  publish:
    name: Publish to PyPi
    if: github.repository == 'Eeems/rnhttp' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs: &release-needs
      - build-sdist
      - build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/p/rnhttp
    steps:
      - name: Download pip packages
        id: download
        uses: actions/download-artifact@v8
        with:
          pattern: pip-*
          merge-multiple: true
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.download.outputs.download-path }}
          skip-existing: true
  release:
    name: Add ${{ matrix.artifact }} to release
    if: github.repository == 'Eeems/rnhttp' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs: *release-needs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Download artifact
        id: download
        uses: actions/download-artifact@v8
        with:
          pattern: pip-*
          merge-multiple: true
          path: dist
      - name: Upload to release
        run: find . -type f | xargs -rI {} gh release upload "$TAG" {} --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        working-directory: ${{ steps.download.outputs.download-path }}
